
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reporte Solar</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:30px;
}

.header{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    min-width:220px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.chart-container{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
}

h1{
    color:#0f766e;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#0f766e;
    color:white;
}

</style>

</head>

<body>

<div class="header">
